apiVersion: v1
kind: Secret
metadata:
  name: kion-creds
  namespace: crossplane-system
  annotations:
    # Enable automatic API key rotation.
    kion.upbound.io/rotate: "true"
    # How often to rotate (default: 168h = 7 days).
    # Must be shorter than the Kion key expiry (typically 14 days).
    kion.upbound.io/rotation-interval: "168h"
    # Optional: override the Secret data key that holds the credentials JSON.
    # kion.upbound.io/credentials-key: "credentials"
type: Opaque
stringData:
  credentials: |
    {
      "apikey": "YOUR_KION_API_KEY",
      "url": "https://kion.example.com",
      "skipsslvalidation": "false"
    }
