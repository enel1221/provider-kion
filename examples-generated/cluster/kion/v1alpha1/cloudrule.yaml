apiVersion: kion.upbound.io/v1alpha1
kind: CloudRule
metadata:
  annotations:
    meta.upbound.io/example-id: kion/v1alpha1/cloudrule
  labels:
    testing.upbound.io/example-name: complete_example
  name: complete-example
spec:
  forProvider:
    awsCloudformationTemplates:
    - idSelector:
        matchLabels:
          testing.upbound.io/example-name: example
    awsIamPolicies:
    - idSelector:
        matchLabels:
          testing.upbound.io/example-name: example
    azureArmTemplateDefinitions:
    - idSelector:
        matchLabels:
          testing.upbound.io/example-name: example
    azurePolicyDefinitions:
    - idSelector:
        matchLabels:
          testing.upbound.io/example-name: example
    azureRoleDefinitions:
    - idSelector:
        matchLabels:
          testing.upbound.io/example-name: example
    complianceStandards:
    - idSelector:
        matchLabels:
          testing.upbound.io/example-name: example
    concurrentCftSync: true
    description: A comprehensive example of a cloud rule with all supported options.
    gcpIamRoles:
    - idSelector:
        matchLabels:
          testing.upbound.io/example-name: example
    internalAwsAmis:
    - id: 1
    internalAwsServiceCatalogPortfolios:
    - id: 1
    labels:
      cost_center: "12345"
      environment: production
      team: security
    name: Complete Cloud Rule Example
    ous:
    - idSelector:
        matchLabels:
          testing.upbound.io/example-name: example
    ownerUserGroups:
    - idSelector:
        matchLabels:
          testing.upbound.io/example-name: example
    ownerUsers:
    - idSelector:
        matchLabels:
          testing.upbound.io/example-name: example
    postWebhookIdSelector:
      matchLabels:
        testing.upbound.io/example-name: example
    preWebhookIdSelector:
      matchLabels:
        testing.upbound.io/example-name: example
    projects:
    - idSelector:
        matchLabels:
          testing.upbound.io/example-name: example
    serviceControlPolicies:
    - idSelector:
        matchLabels:
          testing.upbound.io/example-name: example
