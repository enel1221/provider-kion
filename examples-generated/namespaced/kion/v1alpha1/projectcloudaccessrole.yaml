apiVersion: kion.m.upbound.io/v1alpha1
kind: ProjectCloudAccessRole
metadata:
  annotations:
    meta.upbound.io/example-id: kion/v1alpha1/projectcloudaccessrole
  labels:
    testing.upbound.io/example-name: example
  name: example
  namespace: upbound-system
spec:
  forProvider:
    applyToAllAccounts: true
    longTermAccessKeys: false
    name: example-project-car
    projectIdSelector:
      matchLabels:
        testing.upbound.io/example-name: example
    shortTermAccessKeys: true
    userGroups:
    - idSelector:
        matchLabels:
          testing.upbound.io/example-name: example
    users:
    - id: 1
    webAccess: true
