apiVersion: kion.m.upbound.io/v1alpha1
kind: OUCloudAccessRole
metadata:
  annotations:
    meta.upbound.io/example-id: kion/v1alpha1/oucloudaccessrole
  labels:
    testing.upbound.io/example-name: example
  name: example
  namespace: upbound-system
spec:
  forProvider:
    longTermAccessKeys: false
    name: example-ou-car
    ouIdSelector:
      matchLabels:
        testing.upbound.io/example-name: example
    shortTermAccessKeys: true
    userGroups:
    - idSelector:
        matchLabels:
          testing.upbound.io/example-name: example
    users:
    - id: 1
    webAccess: true
